<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quoridor - Vượt Tường Bắt Tướng</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="screen-glow"></div>
    <div class="background-animation"></div>
    <canvas id="fireworksCanvas"></canvas>

    <div id="auth-screen" class="overlay-container">
        <div class="auth-box glass-panel">
            <h1 class="main-title">QUORIDOR</h1>
            <h2 id="auth-title">Đăng Nhập</h2>
            <input type="text" id="username-inp" placeholder="Tên tài khoản" class="auth-input">
            <input type="password" id="password-inp" placeholder="Mật khẩu" class="auth-input">
            <button id="login-btn" class="glow-btn">Đăng Nhập</button>
            <button id="register-btn" class="glow-btn secondary-btn">Đăng Ký Mới</button>
            <p id="auth-msg" class="error-msg"></p>
        </div>
    </div>

    <div id="main-menu" class="menu-container glass-panel hidden">
        <h1 class="main-title">QUORIDOR</h1>
        <div class="user-profile">
            <h3 id="profile-name">Xin chào, Người Chơi</h3>
            <p>RANK: <span id="profile-rank" class="highlight-text">1000</span> | Thắng: <span id="profile-wins">0</span></p>
        </div>
        
        <div class="menu-options">
            <button id="find-match-btn" class="glow-btn online-btn">⚔️ TÌM TRẬN ONLINE</button>
            
            <div class="bot-section">
                <label>Hoặc Chơi Với Máy:</label>
                <select id="menu-game-mode">
                    <option value="bot-random">Bot Ngẫu nhiên (Rất dễ)</option>
                    <option value="bot-easy">Bot Dò đường (Dễ)</option>
                    <option value="bot-medium">Bot Chặn tường (Khá)</option>
                    <option value="bot-hard" selected>Bot Heuristic (Cực Khó)</option>
                </select>
                <button id="start-bot-btn" class="glow-btn">🤖 ĐẤU VỚI MÁY</button>
            </div>

            <button id="show-leaderboard-btn" class="glow-btn secondary-btn">🏆 BẢNG XẾP HẠNG</button>
        </div>
    </div>

    <div id="matchmaking-screen" class="overlay-container hidden">
        <div class="glass-panel text-center p-20">
            <h2 class="animate-pulse">Đang tìm đối thủ...</h2>
            <p>Vui lòng chờ trong giây lát</p>
            <button id="cancel-match-btn" class="glow-btn secondary-btn mt-10">Hủy</button>
        </div>
    </div>

    <div id="leaderboard-screen" class="overlay-container hidden">
        <div class="glass-panel leaderboard-box">
            <h2>🏆 TOP CAO THỦ</h2>
            <ul id="leaderboard-list"></ul>
            <button id="close-leaderboard-btn" class="glow-btn secondary-btn mt-10">Đóng</button>
        </div>
    </div>

    <div id="victory-overlay" class="hidden">
        <div class="victory-content">
            <h2 id="victory-text">CHIẾN THẮNG!</h2>
            <p id="rank-change-text" class="rank-change"></p>
            <div class="victory-buttons">
                <button id="victory-restart-btn" class="glow-btn">Chơi Lại (Bot)</button>
                <button id="victory-menu-btn" class="glow-btn secondary-btn">Về Menu</button>
            </div>
        </div>
    </div>
    
    <div id="game-screen" class="game-wrapper hidden">
        <header class="game-header">
            <div class="status-bar">
                <div class="turn-indicator">Lượt đi: <span id="current-turn-text" class="player1-text">P1 (Xanh)</span></div>
                <div class="timer-display">⏱ <span id="time-left">60</span>s</div>
            </div>
        </header>

        <div class="controls glass-panel">
            <button id="back-to-menu-btn" class="glow-btn secondary-btn">⬅ Về Đầu Hàng</button>
            <button id="restart-btn" class="glow-btn">Chơi Lại</button>
        </div>

        <main class="game-container">
            <div class="player-panel player2-panel glass-panel">
                <div class="avatar player2-avatar"></div>
                <div class="info">
                    <h3 id="p2-name-display">P2 - QUÂN ĐỎ</h3>
                    <div class="wall-count">Tường: <span id="p2-walls">9</span>/9</div>
                </div>
            </div>

            <div class="board-wrapper glass-panel">
                <div id="board" class="board"></div>
            </div>

            <div class="player-panel player1-panel glass-panel active-p1">
                <div class="avatar player1-avatar"></div>
                <div class="info">
                    <h3 id="p1-name-display">P1 - QUÂN XANH</h3>
                    <div class="wall-count">Tường: <span id="p1-walls">9</span>/9</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
